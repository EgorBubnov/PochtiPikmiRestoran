<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение в Почти Пикми </title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6f2; /* Нежно-розовый фон */
            font-family: 'Nunito', sans-serif;
            color: #5c3a47;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background-color: #fff0f5;
            border: 4px solid #ffb6c1;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff69b4;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #fff;
        }

        .subtitle {
            font-size: 1.2em;
            color: #db7093;
            margin-bottom: 30px;
        }

        .heart-icon {
            font-size: 3em;
            color: #ff1493;
            margin: 20px 0;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .details-box {
            background-color: #fff;
            border: 2px dashed #ff69b4;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .details-box strong {
            color: #ff1493;
        }

        .btn {
            display: inline-block;
            background-color: #ff69b4;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background-color: #ff1493;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.4);
        }

        .decorations {
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 2em;
            opacity: 0.8;
        }
        
        .decorations.right {
            top: auto;
            bottom: -20px;
            left: auto;
            right: -20px;
        }

        /* Конфетти эффект при наведении на кнопку (простой CSS) */
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: gold;
            border-radius: 50%;
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="decorations"> 🎀 ✨</div>
        <div class="decorations right"> 🧁 🍓</div>

        <h1>Почти Пикми</h1>
        <div class="subtitle">Ресторан для самых любимых!</div>

        <div class="heart-icon">💝</div>

        <p>Приветик! ✨<br>
        Ты приглашена в самое уютное, сладкое и розовое место (ну почти)!</p>

        <p>Здесь Вас ждут.</p>

        <div class="details-box">
            <p><strong>Где:</strong> Ресторан "Почти Пикми"</p>
            <p><strong>Когда:</strong> приходи когда хочешь. Я уже свободен</p>
            <p><strong>Дресс-код:</strong> Ты во всем неотразима! 🎀</p>
        </div>

        <p>Пожалуйста, скажи "МЯУ", ! 🥺👉👈</p>

        <button class="btn" onclick="alert('Ура! Я так и знал! Готовься к самому няшному вечеру! 💕')">МЯУ! 💖</button>
    </div>

    <script>
        // Простой скрипт для добавления немного интерактивности
        document.querySelector('.btn').addEventListener('click', function() {
            this.style.backgroundColor = '#ff1493';
            this.innerText = 'Люблю тебя! ';
            
            // Создаем маленькие сердечки при клике
            for(let i=0; i<20; i++) {
                createHeart();
            }
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            heart.style.transition = 'top 3s ease-in, opacity 3s ease-in';
            heart.style.zIndex = '1000';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.style.top = '-10vh';
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => {
                heart.remove();
            }, 3100);
        }
    </script>

</body>
</html>
